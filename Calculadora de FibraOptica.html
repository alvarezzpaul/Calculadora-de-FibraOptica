<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Fibra Óptica</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:350px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

.resultado{
    margin-top:20px;
    font-size:18px;
    line-height:1.8;
}
</style>
</head>
<body>

<div class="container">

<h2>Calculadora de Fibra Óptica</h2>

<label>Ingrese el número de fibra:</label>

<input type="number" id="fibra" min="1" max="432" placeholder="Ejemplo: 25">

<button onclick="buscar()">
Buscar
</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

const colores = [
    "Azul",
    "Naranja",
    "Verde",
    "Marrón",
    "Gris",
    "Blanco",
    "Rojo",
    "Negro",
    "Amarillo",
    "Violeta",
    "Rosa",
    "Aqua"
];

function buscar(){

    const fibra = parseInt(document.getElementById("fibra").value);

    if(isNaN(fibra) || fibra < 1 || fibra > 432){
        document.getElementById("resultado").innerHTML =
        "Ingrese una fibra entre 1 y 432.";
        return;
    }

    const buffer = Math.ceil(fibra / 12);

    let hilo = fibra % 12;

    if(hilo === 0){
        hilo = 12;
    }

    const color = colores[hilo - 1];

    document.getElementById("resultado").innerHTML = `
        <strong>Fibra ${fibra}</strong><br>
        <strong>Búfer:</strong> ${buffer}<br>
        <strong>Hilo:</strong> ${hilo}<br>
        <strong>Color:</strong> ${color}
    `;
}
</script>

</body>
</html>
