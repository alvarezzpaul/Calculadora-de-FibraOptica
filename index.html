<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Fibra Óptica</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
    width:100%;
    max-width:380px;
}

h2{
    text-align:center;
    color:#0d6efd;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:10px;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#0b5ed7;
}

.resultado{
    margin-top:20px;
    padding:15px;
    background:#f8f9fa;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:18px;
    line-height:2;
}
</style>
</head>
<body>

<div class="container">

<h2>Calculadora de Fibra Óptica</h2>

<label>Ingrese el número de fibra:</label>

<input
    type="number"
    id="fibra"
    min="1"
    max="432"
    placeholder="Ejemplo: 25">

<button onclick="buscar()">
Buscar
</button>

<div class="resultado" id="resultado">
<strong>Búfer:</strong><br>
<strong>Color de Búfer:</strong><br>
<strong>Hilo:</strong><br>
<strong>Color de Hilo:</strong>
</div>

</div>

<script>

const colores = [
    "Azul",
    "Naranja",
    "Verde",
    "Marrón",
    "Gris",
    "Blanco",
    "Rojo",
    "Negro",
    "Amarillo",
    "Violeta",
    "Rosa",
    "Aqua"
];

function buscar(){

    const fibra = parseInt(document.getElementById("fibra").value);

    if(isNaN(fibra) || fibra < 1 || fibra > 432){
        document.getElementById("resultado").innerHTML = `
            <strong>Búfer:</strong><br>
            <strong>Color de Búfer:</strong><br>
            <strong>Hilo:</strong><br>
            <strong>Color de Hilo:</strong><br><br>
            Ingrese una fibra entre 1 y 432.
        `;
        return;
    }

    // Calcular búfer
    const buffer = Math.ceil(fibra / 12);

    // Calcular hilo
    let hilo = fibra % 12;
    if(hilo === 0){
        hilo = 12;
    }

    // Color del hilo
    const colorHilo = colores[hilo - 1];

    // Color del búfer
    const colorBuffer = colores[(buffer - 1) % 12];

    document.getElementById("resultado").innerHTML = `
        <strong>Búfer:</strong> ${buffer}<br>
        <strong>Color de Búfer:</strong> ${colorBuffer}<br>
        <strong>Hilo:</strong> ${hilo}<br>
        <strong>Color de Hilo:</strong> ${colorHilo}
    `;
}

</script>

</body>
</html>
